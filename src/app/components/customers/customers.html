<p>customers works!</p>

<button (click)="createCustomerData()"> add cust</button>

<p *ngIf="isLoading">Loading customers...</p>
<p *ngIf="errorMessage" class="error">{{ errorMessage }}</p>

<div *ngIf="!isLoading && customerData.length > 0">
    <table border="1">
        <thead>
            <tr>
                <th>Index</th>
                <th>cust name</th>
                <th>username</th>
                <th>company Name</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let cust of customerData; let i = index; trackBy: trackByCustomerId">
                <td>{{ i + 1 }}</td>
                <td>{{ cust.name}}</td>
                <td> {{ cust.username}} </td>
                <td>{{cust.company.name }}</td>
            </tr>
        </tbody>
    </table>
</div>
